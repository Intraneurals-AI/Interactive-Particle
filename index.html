<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Particle Explosion</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050505;
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let mouse = { x: null, y: null, vX: 0, vY: 0, lastX: 0, lastY: 0 };
        
        // Configuration
        const particleCount = 850;
        const repulsionRadius = 110;
        const returnForce = 0.04;
        const friction = 0.96;

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            init();
        }

        class Particle {
            constructor() {
                this.homeX = Math.random() * canvas.width;
                this.homeY = Math.random() * canvas.height;
                this.x = this.homeX;
                this.y = this.homeY;
                this.vX = 0;
                this.vY = 0;
                this.size = Math.random() * 1.5 + 1;
            }

            update() {
                let dx = mouse.x - this.x;
                let dy = mouse.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                // Movement Logic: Repulsion
                if (distance < repulsionRadius) {
                    let force = (repulsionRadius - distance) / repulsionRadius;
                    let angle = Math.atan2(dy, dx);
                    this.vX -= Math.cos(angle) * force * 12;
                    this.vY -= Math.sin(angle) * force * 12;
                }

                // Movement Logic: Returning Home
                this.vX += (this.homeX - this.x) * returnForce;
                this.vY += (this.homeY - this.y) * returnForce;

                // Physics application
                this.vX *= friction;
                this.vY *= friction;
                this.x += this.vX;
                this.y += this.vY;
            }

            draw(color) {
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // Slight trail effect: using a semi-transparent clear color
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Calculate mouse velocity for reactive coloring
            mouse.vX = mouse.x - mouse.lastX;
            mouse.vY = mouse.y - mouse.lastY;
            let speed = Math.sqrt(mouse.vX ** 2 + mouse.vY ** 2);
            
            // Dynamic Color: Blue (calm) to Red/Orange (energetic)
            let hue = Math.max(10, 210 - (speed * 10));
            let color = `hsla(${hue}, 100%, 75%, 0.9)`;

            particles.forEach(p => {
                p.update();
                p.draw(color);
            });

            mouse.lastX = mouse.x;
            mouse.lastY = mouse.y;
            requestAnimationFrame(animate);
        }

        window.addEventListener('mousemove', (e) => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        // Clear mouse position when it leaves the window
        window.addEventListener('mouseout', () => {
            mouse.x = null;
            mouse.y = null;
        });

        window.addEventListener('resize', resize);

        resize();
        animate();
    </script>
</body>
</html>
